# configs/hw3_3_random/e2_stabilized_dqn.yaml
# HW3-3 E2：Stabilized DQN（+ Gradient Clipping + LR Scheduling + Epsilon Tuning）
# ━━ 比 E1 多了三個穩定化技術 ━━

experiment_id: hw3_3_random_e2_stabilized
hw_part: hw3_3
mode: random
algorithm: StabilizedDQN
seed: 42

network:
  input_dim: 64
  hidden_1: 150
  hidden_2: 100
  output_dim: 4

training:
  episodes: 5000
  max_steps_per_episode: 50
  gamma: 0.9
  learning_rate: 0.001
  batch_size: 200
  replay_capacity: 1000
  target_update_frequency: 500
  use_gradient_clipping: true     # E2：開啟 gradient clipping
  max_grad_norm: 1.0              #      max norm = 1.0
  use_lr_scheduler: true          # E2：開啟 LR scheduling
  lr_scheduler_type: StepLR
  lr_scheduler_step_size: 1000   #      每 1000 steps decay once
  lr_scheduler_gamma: 0.9        #      decay factor 0.9
  use_lightning: true

epsilon:
  epsilon_start: 1.0
  epsilon_end: 0.05               # E2：更低的 epsilon_end（比 E1 的 0.1 更少探索）
  epsilon_decay_type: exponential # E2：指數衰減（比線性更快衰減）
  epsilon_decay_steps: 3000       # E2：更快到達 min epsilon

algorithm_flags:
  use_target_network: true
  use_double_dqn: false
  use_dueling_dqn: false
  use_per: false                  # E2：仍不使用 PER（僅 E3 使用）
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_end: 1.0
  per_epsilon: 1.0e-5
  use_n_step: false
  n_step: 3
  use_noisy_net: false
  use_distributional: false
  c51_atoms: 51
  c51_v_min: -10.0
  c51_v_max: 10.0
