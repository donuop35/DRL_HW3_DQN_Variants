# configs/hw3_3_random/e1_random_dqn_baseline.yaml
# HW3-3 E1：Random Mode DQN Baseline（對照組）
# ━━ 無 gradient clipping、無 LR scheduling、無 PER ━━
# 與 E2/E3 的唯一差異：不加任何穩定化技術

experiment_id: hw3_3_random_e1_baseline
hw_part: hw3_3
mode: random
algorithm: RandomDQN_Baseline
seed: 42

network:
  input_dim: 64
  hidden_1: 150
  hidden_2: 100
  output_dim: 4

training:
  episodes: 5000
  max_steps_per_episode: 50
  gamma: 0.9
  learning_rate: 0.001
  batch_size: 200
  replay_capacity: 1000
  target_update_frequency: 500
  use_gradient_clipping: false    # E1：不使用 grad clip
  max_grad_norm: 1.0
  use_lr_scheduler: false         # E1：不使用 LR scheduler
  lr_scheduler_type: StepLR
  lr_scheduler_step_size: 500
  lr_scheduler_gamma: 0.9
  use_lightning: true             # HW3-3 所有 E 組使用 Lightning

epsilon:
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay_type: linear
  epsilon_decay_steps: 5000       # E1：基礎 decay

algorithm_flags:
  use_target_network: true
  use_double_dqn: false
  use_dueling_dqn: false
  use_per: false                  # E1：不使用 PER
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_end: 1.0
  per_epsilon: 1.0e-5
  use_n_step: false
  n_step: 3
  use_noisy_net: false
  use_distributional: false
  c51_atoms: 51
  c51_v_min: -10.0
  c51_v_max: 10.0
